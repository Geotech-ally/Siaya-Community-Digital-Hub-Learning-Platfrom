version: "3.9"

services:
  api:
    build: .
    container_name: sicodihub_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: sh -c "npx prisma migrate deploy && node dist/main"

  postgres:
    image: postgres:16-alpine
    container_name: sicodihub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sicodihub_lms
    ports:
      - "5432:5432"
    volumes:
      - sicodihub_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sicodihub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  sicodihub_pg_data:
